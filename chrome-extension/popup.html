<!DOCTYPE html>
<html>

<head>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;

      width: 220px;
      height: 30px;

      background: black;

      border-radius: 18px;

      overflow: hidden;

      font-family: 'Nunito', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 12px;
      height: 12px;

      background: #ff4d4d;

      border-radius: 50%;

      animation: pulse 1.5s infinite;
    }

    .text {
      font-size: 14px;
      font-weight: bold;
      color: white;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.25);
        opacity: 0.6;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="dot"></div>

    <div class="text">
      Data recording in process...
    </div>

  </div>

</body>

</html>
