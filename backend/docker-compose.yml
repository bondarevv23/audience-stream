services:
  mongodb:
    image: mongo:7
    container_name: audience-stream-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          mongosh
          --username $$MONGO_INITDB_ROOT_USERNAME
          --password $$MONGO_INITDB_ROOT_PASSWORD
          --authenticationDatabase admin
          --eval "db.adminCommand('ping')"
          --quiet
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audience-stream-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      MongoDB__ConnectionString: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/?authSource=admin"
      MongoDB__Database: audience_stream
      Auth__ApiKey: ${API_KEY}
      Gemini__ApiKey: ${GEMINI_API_KEY}
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
